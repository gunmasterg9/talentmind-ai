version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: talentmind-db
    environment:
      POSTGRES_DB: talentmind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talentmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentmind-backend
    volumes:
      - ./backend:/workspace
      - ./data:/workspace/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/talentmind
      - CHROMA_DB_PATH=/workspace/data/chroma_db
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentmind-frontend
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
