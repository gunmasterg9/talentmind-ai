apiVersion: apps/v1
kind: Deployment
metadata:
  name: redrob-backend
  labels:
    app: redrob-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redrob-backend
  template:
    metadata:
      labels:
        app: redrob-backend
    spec:
      containers:
      - name: backend
        image: redrob/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: redrob-secrets
              key: database-url
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redrob-frontend
  labels:
    app: redrob-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redrob-frontend
  template:
    metadata:
      labels:
        app: redrob-frontend
    spec:
      containers:
      - name: frontend
        image: redrob/frontend:latest
        ports:
        - containerPort: 3000
